<script>
// Cursor trail - gold $ signs
var trail = [];
var trailLength = 10;
window.onload = function() {
  for (var i = 0; i < trailLength; i++) {
    var s = document.createElement('div');
    s.innerHTML = '$';
    s.style.cssText = 'position:fixed;pointer-events:none;font-size:' + (16 - i) + 'px;color:' +
      ['#FFD700','#D4AF37','#FFA500','#FFD700','#D4AF37'][i % 5] +
      ';z-index:9999;transition:all ' + (i * 0.05) + 's ease;font-weight:bold;font-family:Courier New;';
    document.body.appendChild(s);
    trail.push(s);
  }
};
document.addEventListener('mousemove', function(e) {
  if (!trail.length) return;
  trail[0].style.left = e.clientX + 'px';
  trail[0].style.top = e.clientY + 'px';
  for (var i = trail.length - 1; i > 0; i--) {
    trail[i].style.left = trail[i-1].style.left;
    trail[i].style.top = trail[i-1].style.top;
  }
});

function enter() {
  var audio = new Audio('background.mp3');
  audio.play();
  document.getElementById('enterbtn').innerHTML = '&#9834; &nbsp; entering... &nbsp; &#9834;';
  setTimeout(function() {
    window.location.href = 'main.html';
  }, 3000);
}
</script>
